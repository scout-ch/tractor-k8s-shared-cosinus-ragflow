---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "ragflow.fullname" . }}-datasource-cudesch
  labels:
    {{- include "ragflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: ragflow
spec:
  schedule: "30 * * * *"
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      backoffLimit: 0
      template:
        spec:
          {{- if or .Values.imagePullSecrets .Values.ragflow.image.pullSecrets }}
          imagePullSecrets:
            {{- with .Values.imagePullSecrets }}
              {{- toYaml . | nindent 8 }}
              {{- end }}
              {{- with .Values.ragflow.image.pullSecrets }}
              {{- toYaml . | nindent 8 }}
              {{- end }}
          {{- end }}
          containers:
            - name: datasync-cudesch
              image: {{ .Values.datasource.imageBase }}-cudesch
              imagePullPolicy: Always

          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- . | toYaml | nindent 12 }}
          {{- end }}
          restartPolicy: Never